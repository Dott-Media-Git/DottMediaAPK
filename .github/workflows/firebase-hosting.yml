name: Deploy to Firebase Hosting

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18
          cache: npm

      - name: Show runtime versions
        run: |
          node --version
          npm --version

      - name: Remove checked-in node_modules
        run: |
          rm -rf node_modules
          rm -rf backend/node_modules

      - name: Install dependencies
        run: npm ci --legacy-peer-deps --no-audit --no-fund --include=dev

      - name: Build Expo web app
        run: |
          set -o pipefail
          npm run build:web 2>&1 | tee build-web.log

      - name: Print build error tail
        if: failure()
        run: |
          echo "Build failed. Last 200 log lines:"
          tail -n 200 build-web.log || true

      - name: Upload build logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-web-log
          path: build-web.log

      - name: Verify Firebase CLI
        run: npx firebase --version

      - name: Ensure Firebase token is available
        run: |
          if [ -z "${FIREBASE_TOKEN}" ]; then
            echo "FIREBASE_TOKEN is not set. Please add it to your repository secrets."
            exit 1
          fi

      - name: Debug deployment environment
        run: |
          MASKED_TOKEN="${FIREBASE_TOKEN:0:5}****"
          echo "Deploying to Firebase with token: $MASKED_TOKEN"

      - name: Deploy to Firebase Hosting
        run: npx firebase deploy --only hosting
