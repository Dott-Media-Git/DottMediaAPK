name: Dott Main Campaign Worker

on:
  schedule:
    - cron: '17 * * * *'
  workflow_dispatch:

concurrency:
  group: dott-main-campaign-worker
  cancel-in-progress: false

jobs:
  post-dott-main-campaign:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      DOTT_MAIN_USER_ID: cMPZQccGggbhZe9dbvtxFmBehP02
      META_GRAPH_VERSION: v19.0
      DOTT_CAMPAIGN_IMAGE_BASE_URL: https://cdn.jsdelivr.net/gh/Dott-Media-Git/DottMediaAPK@main/backend/public/campaign-images/dottmain
      DOTT_CAMPAIGN_VIDEO_BASE_URL: https://mhvonxlnytyvsisdhxyf.supabase.co/storage/v1/object/public/dott-campaign/backend/public/campaign-videos/dottmain
      DOTT_CAMPAIGN_ASSET_BASE_URL: https://mhvonxlnytyvsisdhxyf.supabase.co/storage/v1/object/public/dott-campaign
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: npm ci --no-audit --no-fund
        working-directory: backend

      - name: Validate required secrets
        run: |
          test -n "$FIREBASE_SERVICE_ACCOUNT_JSON"
          test -n "$SUPABASE_URL"
          test -n "$SUPABASE_SERVICE_ROLE_KEY"

      - name: Run Dott main campaign worker
        shell: bash
        run: |
          for attempt in 1 2 3 4 5; do
            echo "Dott main campaign attempt ${attempt}/5"
            if node scripts/postDottMainCampaign.mjs; then
              exit 0
            fi
            if [ "$attempt" -lt 5 ]; then
              sleep 45
            fi
          done
          exit 1
        working-directory: backend
