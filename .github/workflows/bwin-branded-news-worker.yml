name: Bwin Branded News Worker

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/bwin-branded-news-worker.yml'
      - 'backend/scripts/bwinBrandedNewsWorker.mjs'
      - 'backend/scripts/render_bwin_news_poster_refined.py'
      - 'docs/brand-kits/assets/bwinbetug-logo-from-pdf.png'
  schedule:
    - cron: '12 * * * *'
  workflow_dispatch:

jobs:
  post-branded-news:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      BWIN_USER_ID: 1zvY9nNyXMcfxdPQEyx0bIdK7r53
      META_GRAPH_VERSION: v19.0
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        run: npm ci --no-audit --no-fund
        working-directory: backend

      - name: Install poster renderer dependencies
        run: python -m pip install --disable-pip-version-check pillow requests

      - name: Validate required secrets
        run: |
          test -n "$SUPABASE_URL"
          test -n "$SUPABASE_SERVICE_ROLE_KEY"

      - name: Run Bwin branded news worker
        run: node scripts/bwinBrandedNewsWorker.mjs
        working-directory: backend
