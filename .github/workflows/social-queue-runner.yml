name: Social Queue Runner

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/social-queue-runner.yml'
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  run-social-queue:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Trigger live social queue
        run: |
          curl --fail --show-error --silent --max-time 540 \
            -X POST \
            -H "Content-Type: application/json" \
            -d '{}' \
            https://dottmediaapk.onrender.com/api/autopost/runDue
