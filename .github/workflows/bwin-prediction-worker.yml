name: Bwin Prediction Worker

on:
  schedule:
    - cron: '20 5,11,17 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: Run prediction generation without posting
        required: false
        default: false
        type: boolean
      pick_limit:
        description: Number of picks to include
        required: false
        default: '5'
        type: string
      days_ahead:
        description: How many days ahead to scan for fixtures
        required: false
        default: '2'
        type: string
      horizon_hours:
        description: Only include fixtures inside this horizon
        required: false
        default: '36'
        type: string

concurrency:
  group: bwin-prediction-worker
  cancel-in-progress: false

jobs:
  run-bwin-prediction:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      META_GRAPH_VERSION: ${{ secrets.META_GRAPH_VERSION }}
      BWIN_PREDICTION_DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
      BWIN_PREDICTION_PICK_LIMIT: ${{ github.event.inputs.pick_limit || '5' }}
      BWIN_PREDICTION_DAYS_AHEAD: ${{ github.event.inputs.days_ahead || '2' }}
      BWIN_PREDICTION_HORIZON_HOURS: ${{ github.event.inputs.horizon_hours || '36' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: npm ci --no-audit --no-fund
        working-directory: backend

      - name: Run Bwin prediction worker
        run: node scripts/runBwinPredictionNow.mjs
        working-directory: backend
